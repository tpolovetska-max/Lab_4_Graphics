    <title>Лабораторна робота №4</title> 
   <link rel="icon" href="images/birsday.cat.png" type="image/png">
    <style>
        /* Тут ми додаємо тіні та рамки, як просять у завданні */
        .my-card {
            width: 400px;
            border: 5px solid #ff00ff; /* Рожева рамка */
            box-shadow: 10px 10px 15px rgba(0,0,0,0.3); /* Тінь */
            margin: 20px;
        }
        .my-svg {
            width: 200px;
            margin: 20px;
        }
        /* Проста анімація "погойдування" для картинки */
.my-card:hover {
    transform: scale(1.02); /* Легке збільшення при наведенні */
    transition: 0.3s;
}

@keyframes pulse {
    0% { opacity: 0.8; }
    50% { opacity: 1; }
    100% { opacity: 0.8; }
}

.my-svg {
    animation: pulse 2s infinite; /* Анімація для SVG фігури */
}
    </style>
</head>
<body>
